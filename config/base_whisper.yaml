model_id: "openai/whisper-small"
languages:
  - "lin"
  - "sna"
  - "lug"

peft:
  r: 16
  lora_alpha: 32
  target_modules:
    - "q_proj"
    - "v_proj"
  lora_dropout: 0.05
  bias: "none"

training:
  learning_rate: 1.0e-4
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 2
  num_train_epochs: 30
  fp16: true
  gradient_checkpointing: true
  warmup_steps: 500
  evaluation_strategy: "steps"
  eval_steps: 1000
  save_steps: 1000
  logging_steps: 100
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false
  weight_decay: 0.01

data:
  train_csv: "Train.csv"
  test_csv: "Test.csv"
  duration_min: 1.5
  duration_max: 30.0
  wps_min: 1.0
  wps_max: 8.0
  k_folds: 5
