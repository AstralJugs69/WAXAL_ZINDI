model_id: "facebook/mms-300m"
languages:
  - "lin"
  - "sna"
  - "lug"

training:
  learning_rate: 1.0e-4
  per_device_train_batch_size: 8       # Up from 4 — better GPU utilization, fewer kernel launches
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 2       # 2 GPUs × 8 batch × 2 accum = 32 effective batch (same as before)
  num_train_epochs: 30
  fp16: true
  gradient_checkpointing: true
  warmup_steps: 500
  evaluation_strategy: "steps"
  eval_steps: 1000
  save_steps: 1000
  logging_steps: 100
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false
  weight_decay: 0.01
  group_by_length: false                # Disabled to avoid LengthGroupedSampler error
  dataloader_num_workers: 2            # 2 workers for GPU to prefetch audio batches in background; overridden to 0 on TPU

data:
  train_csv: "Train.csv"
  test_csv: "Test.csv"
  duration_min: 1.5
  duration_max: 15.0                   # Reduced from 20s — caps worst-case sequence length (240k vs 320k samples)
  wps_min: 1.0
  wps_max: 8.0
  k_folds: 5
  use_external_corpora: true           # Load Common Voice + FLEURS to expand training pool
  external_corpora_sources:            # Sources loaded via src/data/external_corpora.py
    - common_voice
    - fleurs


decoding:
  beam_width: 128
  alpha: 0.5
  beta: 1.5
