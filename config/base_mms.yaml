model_id: "facebook/mms-300m"
languages:
  - "lin"
  - "sna"
  - "lug"

training:
  learning_rate: 1.0e-4
  per_device_train_batch_size: 4       # Reduced from 16 — prevents GPU OOM on long sequences
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 8       # Increased from 2 — keeps effective batch size = 32
  num_train_epochs: 30
  fp16: true
  gradient_checkpointing: true
  warmup_steps: 500
  evaluation_strategy: "steps"
  eval_steps: 1000
  save_steps: 1000
  logging_steps: 100
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false
  weight_decay: 0.01
  group_by_length: true                # Groups similar-length samples in each batch — reduces padding waste and peak VRAM
  dataloader_num_workers: 2            # Parallel CPU data loading to keep GPU fed

data:
  train_csv: "Train.csv"
  test_csv: "Test.csv"
  duration_min: 1.5
  duration_max: 20.0                   # Reduced from 30s — caps worst-case sequence length (320k vs 480k samples)
  wps_min: 1.0
  wps_max: 8.0
  k_folds: 5

decoding:
  beam_width: 128
  alpha: 0.5
  beta: 1.5
